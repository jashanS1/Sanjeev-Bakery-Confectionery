        .masonry { column-count: 3; column-gap: 20px; }
        .masonry-item { break-inside: avoid; margin-bottom: 20px; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); position: relative; }
        .masonry-item img { width: 100%; display: block; transition: transform 0.5s ease; }
        .masonry-item:hover img { transform: scale(1.05); }
        @media (max-width: 900px) { .masonry { column-count: 2; } }
        @media (max-width: 600px) { .masonry { column-count: 1; } }
    </style>
</head>
